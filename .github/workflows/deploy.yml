name: Build and Deploy FuncChat Pro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/surefire-reports/

  deploy:
    name: Build, push, and deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build fat JAR
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_URI: ${{ secrets.ECR_URI }}
        run: |
          docker build -t funcchat-pro .
          docker tag funcchat-pro:latest $ECR_URI:latest
          docker tag funcchat-pro:latest $ECR_URI:${{ github.sha }}
          docker push $ECR_URI:latest
          docker push $ECR_URI:${{ github.sha }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_URI }}

            # Pull latest image
            docker pull ${{ secrets.ECR_URI }}:latest

            # Stop and remove old container
            docker stop funcchat-pro || true
            docker rm   funcchat-pro || true

            # Run new container
            docker run -d \
              --name funcchat-pro \
              --restart always \
              -p 8080:8080 \
              -p 8081:8081 \
              -e FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
              -e FIREBASE_DATABASE_URL="${{ secrets.FIREBASE_DATABASE_URL }}" \
              -e FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
              -e S3_BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}" \
              -e S3_REGION="${{ secrets.AWS_REGION }}" \
              -e SERVER_PORT=8080 \
              -e WEBHOOK_PORT=8081 \
              ${{ secrets.ECR_URI }}:latest

            # Verify running
            sleep 3
            docker ps | grep funcchat-pro
            echo "Deployment complete"
